services:
  - type: web
    name: ev-route-optimization
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --worker-class sync --timeout 60 --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "true"
